<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1220" viewBox="0 0 1600 1220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f0df"/>
      <stop offset="58%" stop-color="#e7f2df"/>
      <stop offset="100%" stop-color="#dbeaf0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#24313a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#44515a"/>
    </marker>
    <style>
      .title { font: 800 44px Arial, sans-serif; fill: #18242c; }
      .subtitle { font: 600 21px Arial, sans-serif; fill: #41515c; }
      .section { font: 800 25px Arial, sans-serif; fill: #18242c; }
      .body { font: 600 18px Arial, sans-serif; fill: #25323a; }
      .small { font: 600 15px Arial, sans-serif; fill: #40505a; }
      .tiny { font: 600 13px Arial, sans-serif; fill: #52626d; }
      .done { fill: #d9f2cc; stroke: #67a548; }
      .partial { fill: #fff0c2; stroke: #c5972b; }
      .missing { fill: #ffd9d4; stroke: #c65c51; }
      .neutral { fill: #ffffff; stroke: #9fb1bb; }
      .dark { fill: #24313a; }
      .panel { fill: rgba(255,255,255,0.78); stroke: #b7c5cc; }
      .line { stroke: #44515a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #8a9aa3; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .meter-bg { fill: #dfe7e9; }
      .meter-core { fill: #67a548; }
      .meter-ret { fill: #c5972b; }
      .meter-low { fill: #c65c51; }
    </style>
  </defs>

  <rect width="1600" height="1220" fill="url(#bg)"/>
  <circle cx="1430" cy="130" r="120" fill="#f8d68a" opacity="0.35"/>
  <circle cx="130" cy="1080" r="160" fill="#9fd1c9" opacity="0.32"/>

  <text x="80" y="74" class="title">Snake Roguelite - Current State Map</text>
  <text x="80" y="112" class="subtitle">Position: playable prototype skeleton, not market-ready production.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="150" width="340" height="190" rx="24" class="panel"/>
    <text x="108" y="192" class="section">Game Identity</text>
    <text x="108" y="230" class="body">Vampire Survivors x Snake</text>
    <text x="108" y="260" class="small">No gun. The body is the</text>
    <text x="108" y="284" class="small">weapon, shield, and risk.</text>
    <text x="108" y="316" class="tiny">Core promise is clear and different.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="150" width="1050" height="190" rx="24" class="panel"/>
    <text x="498" y="192" class="section">Playable Core Loop</text>
    <g>
      <rect x="500" y="225" width="112" height="56" rx="14" class="done"/>
      <text x="525" y="258" class="small">Start</text>
      <path d="M612 253 L662 253" class="thin"/>
      <rect x="668" y="225" width="128" height="56" rx="14" class="done"/>
      <text x="690" y="258" class="small">Move</text>
      <path d="M796 253 L846 253" class="thin"/>
      <rect x="852" y="225" width="126" height="56" rx="14" class="done"/>
      <text x="874" y="249" class="small">Kill +</text>
      <text x="878" y="269" class="small">Collect</text>
      <path d="M978 253 L1028 253" class="thin"/>
      <rect x="1034" y="225" width="126" height="56" rx="14" class="partial"/>
      <text x="1056" y="249" class="small">Draft</text>
      <text x="1058" y="269" class="small">Power</text>
      <path d="M1160 253 L1210 253" class="thin"/>
      <rect x="1216" y="225" width="112" height="56" rx="14" class="done"/>
      <text x="1246" y="258" class="small">Boss</text>
      <path d="M1328 253 L1378 253" class="thin"/>
      <rect x="1384" y="225" width="108" height="56" rx="14" class="partial"/>
      <text x="1410" y="249" class="small">Shard</text>
      <text x="1402" y="269" class="small">Unlock</text>
    </g>
    <text x="500" y="314" class="tiny">Loop exists. Fun validation still requires Unity playtest and device feel checks.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="380" width="450" height="370" rx="24" class="panel"/>
    <text x="108" y="422" class="section">Implemented</text>
    <rect x="108" y="454" width="382" height="38" rx="11" class="done"/>
    <text x="126" y="479" class="body">Snake movement + body growth</text>
    <rect x="108" y="504" width="382" height="38" rx="11" class="done"/>
    <text x="126" y="529" class="body">Head/body/tail combat zones</text>
    <rect x="108" y="554" width="382" height="38" rx="11" class="done"/>
    <text x="126" y="579" class="body">Chaser, Dasher, Tank, Boss</text>
    <rect x="108" y="604" width="382" height="38" rx="11" class="done"/>
    <text x="126" y="629" class="body">Wave structure + XP pickups</text>
    <rect x="108" y="654" width="382" height="38" rx="11" class="partial"/>
    <text x="126" y="679" class="body">Power draft + 7 runtime powers</text>
    <rect x="108" y="704" width="382" height="38" rx="11" class="partial"/>
    <text x="126" y="729" class="body">HUD, draft, run-end overlays</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="575" y="380" width="450" height="370" rx="24" class="panel"/>
    <text x="603" y="422" class="section">Retention Foundation</text>
    <rect x="603" y="454" width="382" height="38" rx="11" class="done"/>
    <text x="621" y="479" class="body">Meta Shards after each run</text>
    <rect x="603" y="504" width="382" height="38" rx="11" class="done"/>
    <text x="621" y="529" class="body">Power unlocks from profile JSON</text>
    <rect x="603" y="554" width="382" height="38" rx="11" class="done"/>
    <text x="621" y="579" class="body">Relic/loadout selection</text>
    <rect x="603" y="604" width="382" height="38" rx="11" class="partial"/>
    <text x="621" y="629" class="body">Run telemetry stored locally</text>
    <rect x="603" y="654" width="382" height="38" rx="11" class="missing"/>
    <text x="621" y="679" class="body">Daily objectives / quests</text>
    <rect x="603" y="704" width="382" height="38" rx="11" class="missing"/>
    <text x="621" y="729" class="body">D1-D7 economy balancing</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="380" width="450" height="370" rx="24" class="panel"/>
    <text x="1098" y="422" class="section">Not Ready Yet</text>
    <rect x="1098" y="454" width="382" height="38" rx="11" class="missing"/>
    <text x="1116" y="479" class="body">Unity compile/playtest not run here</text>
    <rect x="1098" y="504" width="382" height="38" rx="11" class="missing"/>
    <text x="1116" y="529" class="body">Mobile performance profiling</text>
    <rect x="1098" y="554" width="382" height="38" rx="11" class="missing"/>
    <text x="1116" y="579" class="body">Juicy VFX, haptics, audio polish</text>
    <rect x="1098" y="604" width="382" height="38" rx="11" class="missing"/>
    <text x="1116" y="629" class="body">12+ powers and real synergies</text>
    <rect x="1098" y="654" width="382" height="38" rx="11" class="missing"/>
    <text x="1116" y="679" class="body">Rewarded ads / IAP economy</text>
    <rect x="1098" y="704" width="382" height="38" rx="11" class="missing"/>
    <text x="1116" y="729" class="body">Store-ready art direction</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="790" width="680" height="330" rx="24" class="panel"/>
    <text x="108" y="832" class="section">Distance To Strong Commercial Snake Game</text>
    <text x="108" y="872" class="small">Core combat prototype</text>
    <rect x="335" y="854" width="340" height="24" rx="12" class="meter-bg"/>
    <rect x="335" y="854" width="238" height="24" rx="12" class="meter-core"/>
    <text x="690" y="874" class="small">70%</text>
    <text x="108" y="920" class="small">Retention systems</text>
    <rect x="335" y="902" width="340" height="24" rx="12" class="meter-bg"/>
    <rect x="335" y="902" width="153" height="24" rx="12" class="meter-ret"/>
    <text x="690" y="922" class="small">45%</text>
    <text x="108" y="968" class="small">Polish / feel / juice</text>
    <rect x="335" y="950" width="340" height="24" rx="12" class="meter-bg"/>
    <rect x="335" y="950" width="85" height="24" rx="12" class="meter-low"/>
    <text x="690" y="970" class="small">25%</text>
    <text x="108" y="1016" class="small">Monetization readiness</text>
    <rect x="335" y="998" width="340" height="24" rx="12" class="meter-bg"/>
    <rect x="335" y="998" width="51" height="24" rx="12" class="meter-low"/>
    <text x="690" y="1018" class="small">15%</text>
    <text x="108" y="1064" class="small">Technical validation</text>
    <rect x="335" y="1046" width="340" height="24" rx="12" class="meter-bg"/>
    <rect x="335" y="1046" width="119" height="24" rx="12" class="meter-ret"/>
    <text x="690" y="1066" class="small">35%</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="815" y="790" width="705" height="330" rx="24" class="panel"/>
    <text x="843" y="832" class="section">Next Best Path</text>
    <rect x="843" y="866" width="96" height="52" rx="15" class="partial"/>
    <text x="876" y="897" class="body">1</text>
    <text x="960" y="888" class="body">Objective / quest system</text>
    <text x="960" y="912" class="tiny">Adds short-term goals and run-to-run pull.</text>
    <path d="M891 918 L891 950" class="line"/>
    <rect x="843" y="950" width="96" height="52" rx="15" class="partial"/>
    <text x="876" y="981" class="body">2</text>
    <text x="960" y="972" class="body">Expand powers to 12+ with synergies</text>
    <text x="960" y="996" class="tiny">Needed for real roguelite replay value.</text>
    <path d="M891 1002 L891 1034" class="line"/>
    <rect x="843" y="1034" width="96" height="52" rx="15" class="partial"/>
    <text x="876" y="1065" class="body">3</text>
    <text x="960" y="1056" class="body">Unity playtest + mobile performance pass</text>
    <text x="960" y="1080" class="tiny">This is the first hard truth checkpoint.</text>
  </g>

  <g>
    <rect x="80" y="1150" width="24" height="24" rx="6" class="done"/>
    <text x="114" y="1168" class="tiny">Done</text>
    <rect x="180" y="1150" width="24" height="24" rx="6" class="partial"/>
    <text x="214" y="1168" class="tiny">Prototype / partial</text>
    <rect x="355" y="1150" width="24" height="24" rx="6" class="missing"/>
    <text x="389" y="1168" class="tiny">Missing before production</text>
  </g>
</svg>
